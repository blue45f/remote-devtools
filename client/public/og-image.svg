<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" width="1200" height="630">
  <defs>
    <radialGradient id="g" cx="50%" cy="0%" r="80%">
      <stop offset="0%" stop-color="#3b82f6" stop-opacity="0.18"/>
      <stop offset="100%" stop-color="#0a0a0a" stop-opacity="0"/>
    </radialGradient>
    <pattern id="grid" x="0" y="0" width="48" height="48" patternUnits="userSpaceOnUse">
      <path d="M 48 0 L 0 0 0 48" fill="none" stroke="#1a1a1a" stroke-width="1"/>
    </pattern>
  </defs>
  <rect width="1200" height="630" fill="#0a0a0a"/>
  <rect width="1200" height="630" fill="url(#grid)" opacity="0.5"/>
  <rect width="1200" height="630" fill="url(#g)"/>

  <!-- Brand mark -->
  <g transform="translate(100,90)">
    <rect x="0" y="0" width="64" height="64" rx="16" fill="#fafafa"/>
    <path d="M22 18h13.8c4.5 0 8 3.5 8 8 0 3.7-2.4 6.7-5.6 7.7L44.6 45h-6.7L32 36.2h-3.5V46H22V18Zm5.9 10.7h7.2c1.6 0 2.7-1.1 2.7-2.7s-1.1-2.7-2.7-2.7h-7.2v5.4Z" fill="#0a0a0a"/>
    <path d="M42.7 45.3a9.3 9.3 0 0 0 0-13.3" stroke="#0a0a0a" stroke-width="4" stroke-linecap="round" opacity="0.5" fill="none"/>
  </g>
  <text x="190" y="138" font-family="Inter, -apple-system, sans-serif" font-size="32" font-weight="600" fill="#fafafa" letter-spacing="-0.5">Remote DevTools</text>

  <!-- Hero -->
  <text x="100" y="290" font-family="Inter, -apple-system, sans-serif" font-size="84" font-weight="600" fill="#fafafa" letter-spacing="-2.5">Debug any web page,</text>
  <text x="100" y="380" font-family="Inter, -apple-system, sans-serif" font-size="84" font-weight="600" fill="#737373" letter-spacing="-2.5">remotely.</text>

  <text x="100" y="450" font-family="Inter, -apple-system, sans-serif" font-size="22" font-weight="400" fill="#a3a3a3">Capture, replay, and inspect customer sessions</text>
  <text x="100" y="482" font-family="Inter, -apple-system, sans-serif" font-size="22" font-weight="400" fill="#a3a3a3">with the real Chrome DevTools.</text>

  <!-- Footer pill -->
  <g transform="translate(100,540)">
    <rect x="0" y="0" width="200" height="40" rx="20" fill="#1f1f1f" stroke="#262626"/>
    <circle cx="20" cy="20" r="3.5" fill="#22c55e"/>
    <text x="32" y="26" font-family="Inter, -apple-system, sans-serif" font-size="13" font-weight="500" fill="#a3a3a3">Open source · MIT</text>
  </g>
  <text x="1100" y="566" font-family="JetBrains Mono, monospace" font-size="14" fill="#525252" text-anchor="end">remote-devtools.vercel.app</text>
