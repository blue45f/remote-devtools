<!doctype html>
<html>
  <head>
    <meta charset="UTF-8" />
    <title>Insight DevTools</title>
    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }

      body {
        font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
        background: #0f0f11;
        color: #e4e4e7;
        height: 100vh;
        display: flex;
        flex-direction: column;
        -webkit-font-smoothing: antialiased;
      }

      /* ===== TOP BAR ===== */
      .top-bar {
        background: #18181b;
        border-bottom: 1px solid #27272a;
        display: flex;
        align-items: center;
        padding: 0 16px;
        min-height: 48px;
        gap: 8px;
      }

      .brand {
        display: flex;
        align-items: center;
        gap: 8px;
        padding-right: 16px;
        border-right: 1px solid #27272a;
        margin-right: 4px;
        flex-shrink: 0;
      }

      .brand-icon {
        width: 24px;
        height: 24px;
        background: linear-gradient(135deg, #8b5cf6, #6366f1);
        border-radius: 6px;
        display: flex;
        align-items: center;
        justify-content: center;
        font-size: 12px;
        font-weight: 700;
        color: #fff;
      }

      .brand-name {
        font-size: 13px;
        font-weight: 600;
        color: #a1a1aa;
        letter-spacing: -0.01em;
      }

      /* ===== TABS ===== */
      .tab {
        padding: 8px 16px;
        cursor: pointer;
        border: none;
        background: transparent;
        color: #71717a;
        font-size: 13px;
        font-weight: 500;
        transition: all 0.15s ease;
        border-radius: 6px;
        display: flex;
        align-items: center;
        gap: 8px;
        white-space: nowrap;
        position: relative;
        font-family: inherit;
      }

      .tab:hover {
        background: #27272a;
        color: #d4d4d8;
      }

      .tab.active {
        background: #27272a;
        color: #f4f4f5;
      }

      .tab.active::after {
        content: '';
        position: absolute;
        bottom: -1px;
        left: 50%;
        transform: translateX(-50%);
        width: 24px;
        height: 2px;
        background: #8b5cf6;
        border-radius: 1px;
      }

      .dot {
        width: 7px;
        height: 7px;
        border-radius: 50%;
        flex-shrink: 0;
      }

      .dot-live {
        background: #22c55e;
        box-shadow: 0 0 6px #22c55e88;
        animation: pulse-dot 2s infinite;
      }

      .dot-archive {
        background: #f59e0b;
      }

      @keyframes pulse-dot {
        0%, 100% { opacity: 1; }
        50% { opacity: 0.4; }
      }

      .tab-scroll {
        display: flex;
        overflow-x: auto;
        flex: 1;
        gap: 2px;
        scrollbar-width: none;
      }

      .tab-scroll::-webkit-scrollbar {
        display: none;
      }

      /* ===== ACTIONS ===== */
      .actions {
        margin-left: auto;
        display: flex;
        gap: 8px;
        align-items: center;
        flex-shrink: 0;
        padding-left: 12px;
        border-left: 1px solid #27272a;
      }

      .badge {
        font-size: 11px;
        font-weight: 600;
        padding: 4px 10px;
        border-radius: 100px;
        display: flex;
        align-items: center;
        gap: 6px;
        white-space: nowrap;
        letter-spacing: -0.01em;
        font-family: inherit;
      }

      .badge-status {
        background: #27272a;
        color: #a1a1aa;
        border: 1px solid #3f3f46;
      }

      .badge-status.connected {
        background: #052e16;
        color: #4ade80;
        border-color: #166534;
      }

      .btn {
        padding: 6px 14px;
        border: 1px solid #3f3f46;
        background: #27272a;
        color: #d4d4d8;
        border-radius: 6px;
        cursor: pointer;
        font-size: 12px;
        font-weight: 500;
        transition: all 0.15s ease;
        display: flex;
        align-items: center;
        gap: 6px;
        white-space: nowrap;
        font-family: inherit;
      }

      .btn:hover {
        background: #3f3f46;
        border-color: #52525b;
        color: #f4f4f5;
      }

      .btn:active {
        transform: scale(0.97);
      }

      .btn-primary {
        background: linear-gradient(135deg, #7c3aed, #6366f1);
        border-color: transparent;
        color: #fff;
      }

      .btn-primary:hover {
        background: linear-gradient(135deg, #6d28d9, #4f46e5);
        border-color: transparent;
      }

      .btn:disabled, .btn.loading {
        opacity: 0.5;
        cursor: not-allowed;
        pointer-events: none;
      }

      /* ===== CONTENT ===== */
      .content-container {
        flex: 1;
        position: relative;
        overflow: hidden;
        background: #0f0f11;
      }

      iframe {
        width: 100%;
        height: 100%;
        border: none;
      }

      .tab-content {
        width: 100%;
        height: 100%;
        display: none;
      }

      .tab-content.active {
        display: block;
      }

      /* ===== URL BAR ===== */
      .url-bar {
        display: none;
        padding: 8px 16px;
        background: #18181b;
        border-bottom: 1px solid #27272a;
        font-size: 12px;
        font-family: 'SF Mono', 'Fira Code', 'Cascadia Code', monospace;
        overflow: auto;
      }

      .url-bar-row {
        display: flex;
        align-items: center;
        gap: 8px;
      }

      .url-bar-label {
        color: #a78bfa;
        font-weight: 600;
        flex-shrink: 0;
        font-size: 10px;
        text-transform: uppercase;
        letter-spacing: 0.05em;
      }

      .url-bar-value {
        color: #67e8f9;
        flex: 1;
        white-space: normal;
        word-break: break-all;
        text-align: left;
        direction: ltr;
      }

      .url-bar-title-value {
        color: #fbbf24;
      }

      /* ===== SPINNER ===== */
      .spinner {
        display: inline-block;
        width: 12px;
        height: 12px;
        border: 2px solid rgba(255,255,255,0.3);
        border-radius: 50%;
        border-top-color: #fff;
        animation: spin 0.6s linear infinite;
      }

      @keyframes spin {
        to { transform: rotate(360deg); }
      }

      /* ===== RESPONSIVE ===== */
      @media (max-width: 1200px) {
        .actions { gap: 6px; }
        .btn { padding: 5px 12px; font-size: 11px; }
        .tab-scroll { max-width: calc(100vw - 380px); }
      }

      @media (max-width: 768px) {
        .top-bar { flex-wrap: wrap; min-height: auto; padding: 8px 12px; }
        .brand { border-right: none; padding-right: 0; margin-right: 0; }
        .actions {
          width: 100%;
          justify-content: flex-end;
          padding-left: 0;
          border-left: none;
          padding-top: 8px;
          border-top: 1px solid #27272a;
        }
        .tab-scroll { max-width: 100%; }
      }
    </style>
  </head>
  <body>
    <div class="top-bar">
      <div class="brand">
        <div class="brand-icon">I</div>
        <span class="brand-name">Insight</span>
      </div>

      <button class="tab active" data-tab="current" onclick="switchTab('current')">
        <span class="dot dot-live"></span>
        Live Session
      </button>

      <div id="previousTabs" class="tab-scroll">
        <!-- Dynamic previous session tabs -->
      </div>

      <div class="actions">
        <button class="btn btn-primary" id="addPreviousTab" onclick="addPreviousRecordTab()">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 5v14M5 12h14"/></svg>
          Load Previous
        </button>
        <div class="badge badge-status" id="connectionInfo">Connecting...</div>
        <button class="btn" id="refreshButton" onclick="refreshCurrentTab()">
          <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M1 4v6h6M23 20v-6h-6"/><path d="M20.49 9A9 9 0 005.64 5.64L1 10m22 4l-4.64 4.36A9 9 0 013.51 15"/></svg>
          Refresh
        </button>
      </div>
    </div>

    <div class="content-container">
      <div id="current-tab" class="tab-content active">
        <div id="current-url-display" class="url-bar">
          <div class="url-bar-row">
            <span class="url-bar-label">URL</span>
            <span id="current-url-text" class="url-bar-value" title=""></span>
          </div>
        </div>
        <iframe id="current-frame" src="" style="height: calc(100% - 0px)" allow="clipboard-write; clipboard-read"></iframe>
      </div>
      <!-- Dynamic previous session content -->
    </div>

    <script>
      let currentTab = 'current'
      let currentRoom = null
      let currentRecordId = null
      let currentDeviceId = null
      let currentUrl = null
      let currentDate = null
      let previousRecordCount = 0
      let loadedRecords = new Set()
      let cachedRoomGroups = null
      let nextRoomIndex = 0

      function escapeHtml(value) {
        if (value === null || value === undefined) return ''
        return String(value)
          .replace(/&/g, '&amp;')
          .replace(/</g, '&lt;')
          .replace(/>/g, '&gt;')
          .replace(/"/g, '&quot;')
          .replace(/'/g, '&#39;')
      }

      function getApiHost() {
        const hostname = window.location.hostname
        if (hostname === 'localhost' || hostname === '127.0.0.1') {
          return 'http://localhost:3000'
        }
        return window.location.origin
      }

      function getWsHost() {
        const hostname = window.location.hostname
        if (hostname === 'localhost' || hostname === '127.0.0.1') {
          return 'localhost:3000'
        }
        return window.location.host
      }

      function getQueryParams() {
        const params = new URLSearchParams(window.location.search)
        const wsParam = params.get('ws')
        const wssParam = params.get('wss')
        const wsUrl = wsParam || wssParam
        if (wsUrl) {
          try {
            const decodedWsUrl = decodeURIComponent(wsUrl)
            let fullWsUrl = decodedWsUrl
            if (!decodedWsUrl.startsWith('ws://') && !decodedWsUrl.startsWith('wss://')) {
              const protocol = window.location.protocol === 'https:' ? 'wss://' : 'ws://'
              fullWsUrl = protocol + decodedWsUrl
            }
            const [baseUrl, queryString] = fullWsUrl.split('?')
            const wsQuery = new URLSearchParams(queryString || '')
            return {
              room: wsQuery.get('room'),
              recordId: wsQuery.get('recordId'),
              recordMode: wsQuery.get('recordMode') === 'true',
              wsUrl: fullWsUrl,
              originalWsUrl: decodedWsUrl,
            }
          } catch (error) {
            console.error('WebSocket URL parse error:', error)
            return null
          }
        }
        return null
      }

      function switchTab(tabName) {
        currentTab = tabName
        document.querySelectorAll('.tab').forEach((tab) => {
          tab.classList.toggle('active', tab.dataset.tab === tabName)
        })
        document.querySelectorAll('.tab-content').forEach((content) => {
          content.classList.toggle('active', content.id === `${tabName}-tab`)
        })
      }

      function refreshCurrentTab() {
        window.location.reload()
      }

      async function getCurrentDeviceId() {
        if (currentDeviceId) return currentDeviceId
        try {
          const response = await fetch(`${getApiHost()}/rooms/record/${currentRecordId}/info`)
          const recordInfo = await response.json()
          if (recordInfo && !recordInfo.error) {
            currentDeviceId = recordInfo.deviceId || 'unknown-device'
            currentUrl = recordInfo.url || ''
            if (recordInfo.createdAt) {
              const koreanTime = new Date(new Date(recordInfo.createdAt).getTime() + 9 * 60 * 60 * 1000)
              currentDate = koreanTime.toISOString().split('T')[0]
            } else if (recordInfo.date) {
              currentDate = recordInfo.date
            } else {
              currentDate = new Date(Date.now() + 9 * 60 * 60 * 1000).toISOString().split('T')[0]
            }
            updateCurrentUrlDisplay()
          }
        } catch (error) {
          console.error('Device ID fetch failed:', error)
        }
        return currentDeviceId || 'unknown-device'
      }

      function updateCurrentUrlDisplay() {
        const urlDisplay = document.getElementById('current-url-display')
        const urlText = document.getElementById('current-url-text')
        const iframe = document.getElementById('current-frame')
        if (currentUrl) {
          urlText.textContent = currentUrl
          urlText.title = currentUrl
          urlDisplay.style.display = 'block'
          requestAnimationFrame(() => {
            const metaHeight = urlDisplay.offsetHeight
            iframe.style.height = `calc(100% - ${metaHeight}px)`
          })
        } else {
          urlDisplay.style.display = 'none'
          iframe.style.height = 'calc(100% - 0px)'
        }
      }

      function setLoadingState(button, isLoading) {
        if (isLoading) {
          button.classList.add('loading')
          button.disabled = true
          const originalHTML = button.innerHTML
          button.dataset.originalHtml = originalHTML
          button.innerHTML = '<span class="spinner"></span> Loading...'
        } else {
          button.classList.remove('loading')
          button.disabled = false
          const originalHTML = button.dataset.originalHtml || '<svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 5v14M5 12h14"/></svg> Load Previous'
          button.innerHTML = originalHTML
        }
      }

      async function addPreviousRecordTab() {
        const button = document.getElementById('addPreviousTab')
        try {
          setLoadingState(button, true)
          if (!cachedRoomGroups) {
            await loadPreviousRoomGroups()
          }
          if (!cachedRoomGroups || nextRoomIndex >= cachedRoomGroups.length) {
            const deviceId = await getCurrentDeviceId()
            alert(`All previous sessions for device ${deviceId} have been loaded.\n(${cachedRoomGroups?.length || 0} sessions total)`)
            return
          }
          const nextRoomData = cachedRoomGroups[nextRoomIndex]
          const backupData = nextRoomData.files
          await addTabForS3Backup(nextRoomData.recordId, nextRoomData.room, backupData, nextRoomData.uniqueId)
          loadedRecords.add(`${nextRoomData.room}_${nextRoomData.recordId}`)
          nextRoomIndex++
        } catch (error) {
          console.error('Failed to load previous session:', error)
          alert('Could not load previous session.')
        } finally {
          setLoadingState(button, false)
        }
      }

      async function loadPreviousRoomGroups() {
        const deviceId = await getCurrentDeviceId()
        if (!currentRecordId) {
          throw new Error('Current record ID must be loaded first.')
        }
        const response = await fetch(`${getApiHost()}/rooms/record/${currentRecordId}/previous`)
        const previousRecords = await response.json()

        cachedRoomGroups = previousRecords.map((record, index) => {
          const fileData =
            record.source === 's3'
              ? {
                  ...record,
                  fileName: `session_${record.timestamp}.json`,
                  filePath: `${record.date}/${record.deviceId}/session_${record.timestamp}.json`,
                  recordId: record.id,
                }
              : record
          return {
            room: record.room || record.name || `Session-${index + 1}`,
            recordId: record.id,
            timestamp: parseInt(record.timestamp),
            files: [fileData],
            date: record.date,
            type: record.source,
            uniqueId: `${record.source}-${record.timestamp}-${index}`,
          }
        })
        nextRoomIndex = 0
      }

      async function addTabForS3Backup(recordId, roomName, backupData, uniqueId) {
        previousRecordCount++
        const tabId = uniqueId || `previous-${previousRecordCount}-${Date.now()}`

        if (document.querySelector(`[data-tab="${tabId}"]`)) {
          switchTab(tabId)
          return
        }

        const deviceGroups = {}
        backupData.forEach((file) => {
          const deviceId = file.deviceId || 'unknown-device'
          if (!deviceGroups[deviceId]) deviceGroups[deviceId] = []
          deviceGroups[deviceId].push(file)
        })

        const targetDeviceId = currentDeviceId || Object.keys(deviceGroups)[0]
        const targetBackupFiles = deviceGroups[targetDeviceId] || []

        let primaryUrl = ''
        let primaryTitle = ''
        if (targetBackupFiles.length > 0) {
          primaryUrl = targetBackupFiles[0].url || ''
          primaryTitle = targetBackupFiles[0].title || ''
        }

        // Create tab button
        const previousTabsContainer = document.getElementById('previousTabs')
        const tabButton = document.createElement('button')
        tabButton.className = 'tab'
        tabButton.dataset.tab = tabId
        tabButton.onclick = () => switchTab(tabId)

        const backupFile = backupData[0]
        const timestamp = parseInt(backupFile.timestamp)
        const backupTime = new Date(timestamp).toLocaleTimeString('en-US', {
          hour: '2-digit',
          minute: '2-digit',
          second: '2-digit',
        })

        // Tab label
        const dot = document.createElement('span')
        dot.className = 'dot dot-archive'
        const label = document.createElement('span')
        label.textContent = primaryTitle
          ? `Session #${previousRecordCount} — ${primaryTitle}`
          : `Session #${previousRecordCount}`
        tabButton.appendChild(dot)
        tabButton.appendChild(label)

        const tooltipLines = [`Time: ${backupTime}`, `Room: ${roomName}`]
        if (primaryTitle) tooltipLines.push(`Title: ${primaryTitle}`)
        tooltipLines.push(primaryUrl ? `URL: ${decodeURIComponent(primaryUrl)}` : 'No URL')
        tabButton.title = tooltipLines.join('\n')
        previousTabsContainer.appendChild(tabButton)

        // Create content
        const contentContainer = document.querySelector('.content-container')
        const tabContent = document.createElement('div')
        tabContent.id = `${tabId}-tab`
        tabContent.className = 'tab-content'

        const escapedUrl = escapeHtml(primaryUrl)
        const escapedTitle = escapeHtml(primaryTitle)

        const titleBar = primaryTitle
          ? `<div class="url-bar" style="display:block">
              <div class="url-bar-row">
                <span class="url-bar-label">Title</span>
                <span class="url-bar-value url-bar-title-value" title="${escapedTitle}">${escapedTitle}</span>
              </div>
            </div>`
          : ''

        const urlBar = primaryUrl
          ? `<div class="url-bar" style="display:block">
              <div class="url-bar-row">
                <span class="url-bar-label">URL</span>
                <span class="url-bar-value" title="${escapedUrl}">${escapedUrl}</span>
              </div>
            </div>`
          : ''

        const metaSections = [titleBar, urlBar].filter(Boolean)

        tabContent.innerHTML = `
          ${metaSections.join('')}
          <iframe id="${tabId}-frame" src="" style="height: 100%;" allow="clipboard-write; clipboard-read"></iframe>
        `
        contentContainer.appendChild(tabContent)

        requestAnimationFrame(() => {
          const iframeEl = document.getElementById(`${tabId}-frame`)
          if (iframeEl) {
            const metaHeightPx = Array.from(tabContent.children)
              .filter((child) => child !== iframeEl)
              .reduce((sum, child) => sum + child.offsetHeight, 0)
            iframeEl.style.height = `calc(100% - ${metaHeightPx}px)`
          }
        })

        const wsHostOnly = getWsHost()
        const filePaths = targetBackupFiles
          .map((file) => file.filePath || `${file.date}/${file.deviceId}/${file.fileName}`)
          .join(',')

        const fileTimestampMatch = backupFile.fileName.match(/session_(\d+)\.json/)
        const fileTimestamp = fileTimestampMatch ? fileTimestampMatch[1] : backupFile.timestamp
        const encodedDeviceId = encodeURIComponent(targetDeviceId || 'unknown-device')
        const s3SessionId = `s3-${encodedDeviceId}-${fileTimestamp}-0`

        const s3BackupParams = {
          s3Backup: 'true',
          deviceId: targetDeviceId,
          room: roomName,
          recordId: s3SessionId,
          date: currentDate,
          fileCount: targetBackupFiles.length,
          filePaths: filePaths,
          s3FilePath:
            targetBackupFiles[0].filePath ||
            `${targetBackupFiles[0].date}/${targetBackupFiles[0].deviceId}/${targetBackupFiles[0].fileName}`,
          tabId: tabId,
          timestamp: backupFile.timestamp,
        }

        const wsUrl = `${wsHostOnly}?${new URLSearchParams(s3BackupParams).toString()}`
        const isHttps = window.location.protocol === 'https:'
        const protocol = isHttps ? 'wss' : 'ws'
        const devtoolsUrl = `/devtools/index.html?${protocol}=${encodeURIComponent(wsUrl)}`

        document.getElementById(`${tabId}-frame`).src = devtoolsUrl
        switchTab(tabId)
      }

      async function initialize() {
        const params = getQueryParams()
        currentRoom = params.room
        currentRecordId = params.recordId

        const currentFrame = document.getElementById('current-frame')
        const searchParams = new URLSearchParams(window.location.search)
        const wsUrl = searchParams.get('ws')
        const wssUrl = searchParams.get('wss')
        const fallbackWsUrl = wssUrl || wsUrl || ''
        const wsUrlForIframe = params.originalWsUrl || decodeURIComponent(fallbackWsUrl)

        const isHttps = window.location.protocol === 'https:'
        const protocol = isHttps ? 'wss' : 'ws'
        currentFrame.src = `/devtools/index.html?${protocol}=${encodeURIComponent(wsUrlForIframe)}`

        const connectionInfo = document.getElementById('connectionInfo')
        loadedRecords.add(currentRecordId)

        getCurrentDeviceId().then((deviceId) => {
          connectionInfo.textContent = `Device: ${deviceId}`
          connectionInfo.classList.add('connected')
        })
      }

      window.addEventListener('load', initialize)
    </script>
  </body>
</html>
