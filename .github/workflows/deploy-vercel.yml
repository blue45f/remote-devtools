name: Deploy demo to Vercel

# Manual-only trigger.
#
# Required GitHub secrets (set under Settings → Environments → production):
#   VERCEL_TOKEN       — https://vercel.com/account/tokens (full account scope)
#   VERCEL_ORG_ID      — from .vercel/project.json after `vercel link`
#   VERCEL_PROJECT_ID  — same file
#
# Until those are set this workflow always fails on the "Pull Vercel project
# metadata" step, which is why we run it on demand only. For day-to-day
# deploys, `vercel --prod` from a developer machine works fine — the Vercel
# CLI uses your interactive login and bypasses GitHub Secrets entirely.
#
# To re-enable push-triggered auto-deploys: add the three secrets above and
# uncomment the `push:` block below.
on:
  workflow_dispatch:
  # push:
  #   branches: [main]
  #   paths:
  #     - "client/**"
  #     - "sdk/**"
  #     - "vercel.json"
  #     - "pnpm-lock.yaml"
  #     - "package.json"
  #     - ".github/workflows/deploy-vercel.yml"

concurrency:
  group: vercel-prod
  cancel-in-progress: false

jobs:
  deploy:
    name: Deploy production
    runs-on: ubuntu-latest
    environment: production
    permissions:
      contents: read
      deployments: write
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install Vercel CLI
        run: pnpm add -g vercel@latest

      - name: Pull Vercel project metadata
        run: vercel pull --yes --environment=production --token=$VERCEL_TOKEN
        env:
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}

      - name: Build
        run: vercel build --prod --token=$VERCEL_TOKEN
        env:
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}

      - name: Deploy
        id: deploy
        run: |
          URL=$(vercel deploy --prebuilt --prod --token=$VERCEL_TOKEN)
          echo "url=$URL" >> "$GITHUB_OUTPUT"
        env:
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}

      - name: Summary
        run: |
          echo "## 🚀 Production deploy ready" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "Deploy URL: ${{ steps.deploy.outputs.url }}" >> $GITHUB_STEP_SUMMARY
          echo "Public URL: https://remote-devtools.vercel.app/" >> $GITHUB_STEP_SUMMARY
